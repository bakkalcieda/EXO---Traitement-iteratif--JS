<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traitement itératif JS EXO</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script/script.js"></script>
</head>
<body>

    <h1 class="titre-principal">EXO : Traitement itératif</h1>

    <div class="page">

        <!-- EXO 1 -->
        <div class="feuille">
            <div class="trou"></div>
            <div class="marge"></div>
            <div class="contenu">
                <h2>EXO 1 : Table de multiplication</h2>
                <label for="nombre">Entrez un nombre :</label>
                <input type="number" id="nombre" placeholder="Ex: 5" />
                <button id="btn">Afficher</button>
                <div id="resultat" class="zone-resultat"></div>
            </div>
        </div>

        <!--  EXO 2  -->
        <div class="feuille">
            <div class="trou"></div>
            <div class="marge"></div>
            <div class="contenu">
                <h2>EXO 2 : Nombres premiers</h2>
                <label for="nombre2">Entrez un nombre x :</label>
                <input type="number" id="nombre2" placeholder="Ex: 10" />
                <button id="btn2">Afficher</button>
                <div id="resultat2" class="zone-resultat"></div>
            </div>
        </div>

        <!--  EXO 3 -->
        <div class="feuille">
            <div class="trou"></div>
            <div class="marge"></div>
            <div class="contenu">
                <h2>EXO 3 : Convertisseur/ base de destination</h2>
                <label for="nombre3">Entrez un nombre décimal :</label>
                <input type="text" id="nombre3" placeholder="Ex: 255" />
                <label for="base3">Base de destination :</label>
                <select id="base3">
                    <option value="2">Base 2</option>
                    <option value="8">Base 8</option>
                    <option value="16">Base 16</option>
                </select>
                <button id="btn3">Convertir</button>
                <input type="text" id="resultat3" readonly placeholder="Résultat ici..." />
            </div>
        </div>

        <!--  EXO 4  -->
        <div class="feuille">
            <div class="trou"></div>
            <div class="marge"></div>
            <div class="contenu">
                <h2>EXO 4 : Convertisseur → base 10</h2>
                <label for="nombre4">Entrez un nombre :</label>
                <input type="text" id="nombre4" placeholder="Ex: FF" />
                <label for="base4">Base d'origine :</label>
                <select id="base4">
                    <option value="2">Base 2</option>
                    <option value="8">Base 8</option>
                    <option value="16">Base 16</option>
                </select>
                <button id="btn4">Convertir</button>
                <input type="text" id="resultat4" readonly placeholder="Résultat ici..." />
            </div>
        </div>

<!--  EXO 5 -->
        <div class="feuille">
            <div class="trou"></div>
            <div class="marge"></div>
            <div class="contenu">
                <h2>EXO 5 : Addition primaire</h2>
                <label for="nombre5a">Premier nombre :</label>
                <input type="text" id="nombre5a" placeholder="Ex: 1234" />
                <label for="nombre5b">Deuxième nombre :</label>
                <input type="text" id="nombre5b" placeholder="Ex: 5678" />
                <button id="btn5">Additionner</button>
                <input type="text" id="resultat5" readonly placeholder="Résultat ici..." />
            </div>
        </div>

</body>
</html>
